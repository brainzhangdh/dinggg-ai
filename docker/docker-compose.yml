# ============================================
# 顶呱呱AI宝 - Docker Compose 配置
# ============================================

version: '3.8'

services:
  # ========== MongoDB 数据库 ==========
  mongodb:
    image: mongo:7
    container_name: dinggg-mongodb
    restart: always
    environment:
      MONGO_INITDB_DATABASE: dinggg
    volumes:
      - mongodb_data:/data/db
      # - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    ports:
      - "27017:27017"
    networks:
      - dinggg-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== Redis 缓存 ==========
  redis:
    image: redis:7-alpine
    container_name: dinggg-redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
      - redis_conf:/usr/local/etc/redis
    ports:
      - "6379:6379"
    networks:
      - dinggg-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== 后端服务 ==========
  server:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile
    container_name: dinggg-server
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      # MongoDB
      MONGODB_URI: mongodb://mongodb:27017/dinggg
      # Redis
      REDIS_URL: redis://redis:6379
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 2h
      JWT_REFRESH_EXPIRES_IN: 7d
      # 微信
      WECHAT_APPID: ${WECHAT_APPID}
      WECHAT_SECRET: ${WECHAT_SECRET}
      # MiniMax
      MINIMAX_API_KEY: ${MINIMAX_API_KEY}
      MINIMAX_GROUP_ID: ${MINIMAX_GROUP_ID}
      MINIMAX_BASE_URL: https://api.minimax.chat
      # 微信支付
      WECHAT_PAY_MCHID: ${WECHAT_PAY_MCHID}
      WECHAT_PAY_API_KEY: ${WECHAT_PAY_API_KEY}
      WECHAT_PAY_APPID: ${WECHAT_PAY_APPID}
      WECHAT_PAY_NOTIFY_URL: ${WECHAT_PAY_NOTIFY_URL}
      # 日志
      LOG_LEVEL: info
      LOG_DIR: /app/logs
      # 限流
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 100
      FREE_USER_DAILY_QUOTA: 3
    ports:
      - "3000:3000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dinggg-network
    volumes:
      - server_logs:/app/logs

  # ========== Nginx 反向代理 ==========
  nginx:
    image: nginx:alpine
    container_name: dinggg-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - server
    networks:
      - dinggg-network

# ============================================
# 网络和存储
# ============================================
networks:
  dinggg-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  redis_conf:
    driver: local
  server_logs:
    driver: local
  nginx_cache:
    driver: local
