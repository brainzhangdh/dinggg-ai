name: CI - Build & Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============================================
  # 前端构建验证
  # ============================================
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Validate manifest.json
        run: |
          if ! command -v jq &> /dev/null; then sudo apt-get install -y jq; fi
          cat manifest.json | jq empty && echo "✅ manifest.json is valid JSON"

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build || echo "No build script, skipping"

  # ============================================
  # 后端依赖验证
  # ============================================
  backend:
    name: Backend Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci --only=production

      - name: Validate package.json scripts
        run: |
          cd backend
          echo "=== Dependencies installed ==="
          ls node_modules | wc -l
          echo "=== Checking for critical packages ==="
          for pkg in express mongoose redis jsonwebtoken bcryptjs; do
            if [ -d "node_modules/$pkg" ]; then
              echo "✅ $pkg installed"
            else
              echo "⚠️ $pkg not found"
            fi
          done

  # ============================================
  # Docker配置验证
  # ============================================
  docker:
    name: Docker Configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Dockerfile
        run: |
          if [ -f docker/Dockerfile ]; then
            echo "=== Dockerfile exists ==="
            head -5 docker/Dockerfile
            echo "✅ Dockerfile found"
          else
            echo "❌ Dockerfile not found"
            exit 1
          fi

      - name: Validate docker-compose.yml
        run: |
          if [ -f docker/docker-compose.yml ]; then
            echo "✅ docker-compose.yml found"
            docker-compose -f docker/docker-compose.yml config --quiet && echo "✅ docker-compose.yml is valid"
          else
            echo "❌ docker-compose.yml not found"
            exit 1
          fi

      - name: Validate Nginx config
        run: |
          if [ -f nginx/conf.d/default.conf ]; then
            echo "✅ Nginx config found"
          fi

  # ============================================
  # 安全扫描
  # ============================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run npm audit on backend
        working-directory: ./backend
        run: |
          npm ci --only=production
          npm audit --audit-level=high || echo "Audit completed with warnings"
